<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{site.title}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <!-- As a heading -->
    <nav class="navbar navbar-dark bg-dark mb-3">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" th:text="#{page.search}"></span>
        </div>
    </nav>
<div class="container">
    <form method="post" th:object="${motoForm}" th:action="@{/motos/save}">
        <div class="row">
            <div class="col" >
                <div class="alert alert-danger" role="alert" th:each="err : ${#fields.errors('*')}" th:text="${err}"></div>
            </div>
        </div>
        <div class ="row">
            <div class="col">
                <label for="brand "class="form-label">番号</label>
                <span th:text="*{motoNo}"></span>
                <input type="hidden" th:field="*{motoNo}">
                <input type="hidden" th:field="*{version}">
            </div>
        </div>
        <div class="row">
            <div class="col">
                <lavel for ="brand" class="form-label">メーカー</lavel>
                <select th:field = "*{brand.brandId}" class="form-select"  id="brand" aria-label="Default select example">
                    <option value=""></option>
                    <option th:each="brand : ${brands}" th:text="${brand.brandName}" th:value="${brand.brandId}"></option>
                </select>

            </div>
        </div>

        <!-- 車名・シート高 -->
        <div class="row">
            <div class="col">
                <label for="motoName" class="form-label">車名</label>
                <input th:field="*{motoName}" type="text" class="form-control" id="motoName">
            </div>
            <div class="col">
                <label for="seatHeight" class="form-label">シート高</label>
                <input th:field="*{seatHeight}" type="text" class="form-control" id="seatHeight">
            </div>
        </div>

        <!-- 気筒・冷却・価格 -->
        <div class="row">
            <div class="col">
                <label for="cylinder" class="form-label">気筒</label>
                <input th:field="*{cylinder}" type="text" class="form-control" id="cylinder">
            </div>
            <div class="col">
                <label for="cooling" class="form-label">冷却方式</label>
                <input th:field="*{cooling}" type="text" class="form-control" id="cooling">
            </div>
            <div class="col">
                <label for="price" class="form-label">価格</label>
                <input th:field="*{price}" type="text" class="form-control" id="price">
            </div>
        </div>

        <!-- コメント -->
        <div class="row">
            <div class="col">
                <label for="comment" class="form-label">コメント</label>
                <textarea th:field="*{comment}" class="form-control" id="comment" rows="3"></textarea>
            </div>
        </div>

        <!-- 保存 -->
        <div class="row mt-3">
            <div class="col text-end">
                <button class="btn btn-primary" type="submit">保存</button>
            </div>
        </div>

    </form>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>

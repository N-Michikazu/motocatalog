<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p&display=swap" rel="stylesheet">
    <style>
      body {
        font-family:'M PLUS 1p', sans-serif;
      }
    </style>

</head>

<body>
  <!-- As a heading -->
  <nav class="navbar navbar-dark bg-dark mb-3">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">バイク管理</span>
    </div>
  </nav>
  <div class="container">
    <form th:action= "@{/motos}" method="get">
      <div class="row">
        <div class="col">
          <div class="mb-3">
            <label for="brand" class="form-label">バイクメーカー</label>
            <select class="form-select" th:field="${searchForm.brandId}" id="brand" aria-label="Default select example">
              <option value="">選択してください</option>
              <option th:each="brand : ${brands}" th:text="${brand.brandName}" th:value="${brand.brandId}"></option>


            </select>
          </div>
        </div>
        <div class="col">
          <div class="mb-3">
            <label for="keyword"  class="form-label">キーワード</label>
            <input type="text" class="form-control" th:field="${searchForm.keyword}" id="keyword" placeholder="車名もしくはコメントの一部を入力">
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col d-flex flex-row-reverse">
          <button type="button" class="btn btn-primary">新規</button>
          <a th:href="@{/motos/reset}" class="btn btn-secondary ms-1 me-1">リセット</a>
          <button type="submit" class="btn btn-success">検索</button>
        </div>
      </div>
    </form>
    <div class="row">
      <div class="col">
        <table class="table  table-dark table-striped mt-3">
          <thead>
            <tr>
              <th scope="col">1</th>
              <th scope="col">メーカー</th>
              <th scope="col">車名</th>
              <th scope="col">エンジン</th>
              <th scope="col">価格</th>
              <th scope="col">コメント</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="moto : ${motos}">
              <td th:text="${moto.motoNo}"></td>
              <td th:text="${moto.brand.brandName}"></td>
              <td th:text="${moto.motoName}"></td>
              <td th:text="${moto.cooling} + ${moto.cylinder}"></td>
              <td th:text="${moto.price}"></td>
              <td th:text="${moto.comment}"></td>
            </tr>
            
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
